name: Build iOS IPA

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Build Name
        id: buildname
        run: echo "name=$(date +'%Y-%m-%d')_Greenville" >> "$GITHUB_OUTPUT"

      - name: Install Godot
        id: godot
        run: |
          curl -L https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_macos.universal.zip -o godot.zip
          unzip godot.zip -d godot
          chmod +x godot/Godot.app/Contents/MacOS/Godot

      - name: Download Export Templates
        run: |
          curl -L https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -o templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.6.stable/
          unzip templates.tpz -d ~/Library/Application\ Support/Godot/export_templates/

      - name: Move iOS Export Template to Correct Directory
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.6.stable/
          mv ~/Library/Application\ Support/Godot/export_templates/templates/ios.zip ~/Library/Application\ Support/Godot/export_templates/4.6.stable/

      - name: Export Godot Project for iOS
        run: |
          mkdir -p build
          ./godot/Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" build/ios_project.zip
        continue-on-error: true

      - name: Build Xcode Project (Unsigned)
        run: |
          cd build
          xcodebuild -project ios_project.xcodeproj -scheme ios_project -sdk iphoneos -configuration Release -destination generic/platform=iOS archive -archivePath ios_project.xcarchive CODE_SIGNING_ALLOWED=NO

      - name: Package Unsigned IPA
        run: |
          cd build/ios_project.xcarchive/Products/Applications
          mkdir -p Payload
          mv *.app Payload/
          zip -r ../ios_project.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildname.outputs.name }}
          path: build/ios_project.xcarchive/Products/ios_project.ipa
